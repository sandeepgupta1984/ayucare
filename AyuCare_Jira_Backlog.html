<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AayuCare — Jira Backlog</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f5f7;color:#172b4d;font-size:13px}
.topbar{background:#fff;border-bottom:1px solid #dfe1e6;padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.proj-icon{width:32px;height:32px;border-radius:6px;background:#1D9E75;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.proj-info h1{font-size:14px;font-weight:600;color:#172b4d}
.proj-info p{font-size:11px;color:#5e6c84}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto;align-items:center}
.filters input,.filters select{font-size:12px;padding:5px 8px;border:1px solid #dfe1e6;border-radius:4px;background:#fff;color:#172b4d}
.view-btns{display:flex;border:1px solid #dfe1e6;border-radius:4px;overflow:hidden}
.vb{padding:5px 12px;font-size:12px;background:#fff;border:none;cursor:pointer;color:#5e6c84}
.vb.active{background:#0052cc;color:#fff}
.content{padding:16px 20px}
.sumstrip{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.sumcard{background:#fff;border:1px solid #dfe1e6;border-radius:6px;padding:10px 16px;text-align:center;min-width:90px}
.sumcard .n{font-size:22px;font-weight:700;color:#172b4d}
.sumcard .l{font-size:10px;color:#5e6c84;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

/* group section */
.grp-block{margin-bottom:14px}
.grp-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid #dfe1e6;border-radius:6px 6px 0 0;cursor:pointer;user-select:none;border-bottom:2px solid transparent}
.grp-hdr:hover{background:#f4f5f7}
.grp-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.grp-label{font-size:12px;font-weight:700;color:#172b4d}
.grp-sub{font-size:11px;color:#5e6c84}
.grp-count{font-size:11px;color:#5e6c84}
.grp-sp{font-size:11px;color:#5e6c84;margin-left:auto}
.grp-chev{font-size:10px;color:#5e6c84;transition:transform .15s}
.grp-chev.open{transform:rotate(90deg)}

/* epic within group */
.epic-block{border:1px solid #dfe1e6;border-top:none;background:#fff}
.epic-hdr{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 24px;background:#f8f9fb;border-bottom:1px solid #f0f1f3;cursor:pointer;user-select:none}
.epic-hdr:hover{background:#f0f1f3}
.edot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.elabel{font-size:11px;font-weight:600;color:#172b4d}
.ecount{font-size:10px;color:#5e6c84}
.esp{font-size:10px;color:#5e6c84;margin-left:auto}
.echev{font-size:9px;color:#5e6c84;transition:transform .15s}
.echev.open{transform:rotate(90deg)}

/* story table */
.etable{width:100%;border-collapse:collapse}
.etable th{font-size:10px;font-weight:600;color:#5e6c84;text-align:left;padding:5px 8px 5px 32px;border-bottom:1px solid #dfe1e6;text-transform:uppercase;letter-spacing:.04em;background:#fff}
.etable th:first-child{padding-left:32px}
.etable td{padding:6px 8px;border-bottom:1px solid #f4f5f7;vertical-align:middle;background:#fff}
.etable td:first-child{padding-left:32px}
.etable tr:hover td{background:#f4f5f7;cursor:pointer}
.ikey{font-size:10px;color:#0052cc;font-family:monospace;font-weight:600;white-space:nowrap}
.ititle{font-size:12px;color:#172b4d;line-height:1.4}
.isub{font-size:10px;color:#5e6c84;margin-top:2px}
.pbadge{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px}
.p0{background:#FFE2E2;color:#AE2A19}
.p1{background:#FFF0B3;color:#974F0C}
.p2{background:#DEEBFF;color:#0747A6}
.sp-chip{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#f4f5f7;border:1px solid #dfe1e6;font-size:10px;font-weight:600;color:#5e6c84}
.sbadge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;background:#f4f5f7;color:#5e6c84}
.stbadge{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px}
.todo{background:#f4f5f7;color:#5e6c84}
.prog{background:#DEEBFF;color:#0747A6}
.done{background:#E3FCEF;color:#006644}
.persona-pill{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px}
.pp-child{background:#E6F1FB;color:#0C447C}
.pp-parent{background:#EAF3DE;color:#27500A}
.pp-user{background:#F1EFE8;color:#444441}

/* board */
.board{display:none}
.bcols{display:flex;gap:12px;align-items:flex-start;overflow-x:auto;padding-bottom:8px}
.bcol{min-width:220px;flex:1}
.bcolhdr{font-size:11px;font-weight:600;color:#5e6c84;padding:6px 8px;border-bottom:2px solid #dfe1e6;margin-bottom:6px;display:flex;justify-content:space-between;text-transform:uppercase;letter-spacing:.04em}
.bcard{background:#fff;border:1px solid #dfe1e6;border-radius:6px;padding:10px 12px;margin-bottom:6px;cursor:pointer}
.bcard:hover{border-color:#4c9aff;box-shadow:0 0 0 2px #4c9aff33}
.bkey{font-size:10px;color:#0052cc;font-family:monospace;margin-bottom:3px}
.btitle{font-size:11px;color:#172b4d;line-height:1.4;margin-bottom:6px}
.bfoot{display:flex;align-items:center;justify-content:space-between;gap:4px;flex-wrap:wrap}
.bepicdot{width:8px;height:8px;border-radius:1px;flex-shrink:0}

/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(9,30,66,.5);z-index:200;align-items:flex-start;justify-content:center;padding-top:40px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:8px;width:90%;max-width:560px;max-height:82vh;overflow-y:auto;padding:22px;box-shadow:0 8px 32px rgba(9,30,66,.25)}
.mhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.mkey{font-size:11px;color:#0052cc;font-family:monospace;font-weight:600}
.mclose{background:none;border:none;font-size:18px;cursor:pointer;color:#5e6c84;line-height:1}
.mtitle{font-size:15px;font-weight:600;color:#172b4d;margin-bottom:14px;line-height:1.4}
.mrow{display:flex;align-items:center;gap:8px;font-size:12px;color:#5e6c84;margin-bottom:6px}
.mrow strong{min-width:80px;color:#172b4d}
.mdesc{font-size:12px;color:#5e6c84;line-height:1.6;margin:12px 0;padding:10px 12px;background:#f4f5f7;border-radius:4px;border-left:3px solid #dfe1e6;font-style:italic}
.mgrp{font-size:11px;color:#5e6c84;margin-bottom:14px}
.ac-section{border-top:1px solid #dfe1e6;padding-top:12px;margin-top:12px}
.aclabel{font-size:10px;font-weight:600;color:#5e6c84;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.acitem{font-size:11px;color:#172b4d;padding:5px 0;border-bottom:1px solid #f4f5f7;line-height:1.5}
.acitem::before{content:'✓ ';color:#006644;font-weight:700}
.acitem:last-child{border-bottom:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="proj-icon">AC</div>
  <div class="proj-info">
    <h1>AayuCare</h1>
    <p>Project key: AYUC &nbsp;·&nbsp; Scrum board &nbsp;·&nbsp; 3 sprints planned &nbsp;·&nbsp; Grouped by problem</p>
  </div>
  <div class="filters">
    <input type="text" id="search" placeholder="Search issues…" style="width:130px" oninput="applyF()">
    <select id="fgrp" onchange="applyF()">
      <option value="">All groups</option>
      <option value="G1">Group 1 — Records inaccessible</option>
      <option value="G2">Group 2 — Emergency paralysis</option>
      <option value="G3">Group 3 — Doctor visit lost</option>
      <option value="G4">Group 4 — Medication confusion</option>
    </select>
    <select id="fepic" onchange="applyF()">
      <option value="">All epics</option>
      <option value="HRV">Health record vault</option>
      <option value="EP">Emergency passport</option>
      <option value="MT">Medication tracker</option>
      <option value="TA">Trust & access</option>
    </select>
    <select id="fspr" onchange="applyF()">
      <option value="">All sprints</option>
      <option value="S1">Sprint 1</option>
      <option value="S2">Sprint 2</option>
      <option value="S3">Sprint 3</option>
    </select>
    <select id="fpri" onchange="applyF()">
      <option value="">All priorities</option>
      <option value="P0">P0</option>
      <option value="P1">P1</option>
      <option value="P2">P2</option>
    </select>
    <div class="view-btns">
      <button class="vb active" onclick="setView('backlog',this)">Backlog</button>
      <button class="vb" onclick="setView('board',this)">Board</button>
    </div>
  </div>
</div>

<div class="content">
  <div class="sumstrip">
    <div class="sumcard"><div class="n" id="sn-total">0</div><div class="l">Issues</div></div>
    <div class="sumcard"><div class="n" id="sn-sp">0</div><div class="l">Story pts</div></div>
    <div class="sumcard"><div class="n" id="sn-p0">0</div><div class="l">P0 items</div></div>
    <div class="sumcard" style="border-top:3px solid #0052cc"><div class="n" id="sn-s1">0</div><div class="l">Sprint 1 pts</div></div>
    <div class="sumcard" style="border-top:3px solid #974F0C"><div class="n" id="sn-s2">0</div><div class="l">Sprint 2 pts</div></div>
    <div class="sumcard" style="border-top:3px solid #5e6c84"><div class="n" id="sn-s3">0</div><div class="l">Sprint 3 pts</div></div>
  </div>

  <div id="backlog-view"><div id="grp-list"></div></div>

  <div class="board" id="board-view">
    <div class="bcols">
      <div class="bcol"><div class="bcolhdr"><span>To Do</span><span id="bc-todo-n">0</span></div><div id="bc-todo"></div></div>
      <div class="bcol"><div class="bcolhdr"><span>In Progress</span><span id="bc-prog-n">0</span></div><div id="bc-prog"></div></div>
      <div class="bcol"><div class="bcolhdr"><span>Done</span><span id="bc-done-n">0</span></div><div id="bc-done"></div></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeM()">
  <div class="modal" id="modal-body"></div>
</div>

<script>
const GROUPS = [
  { id:'G1', label:'Group 1 — Records inaccessible when needed most', color:'#A32D2D',
    sub:'Shared root: no single always-accessible digital backup · Adult Child: Retrieval Paradox · Parent: Physical File Fragility' },
  { id:'G2', label:'Group 2 — Paralysis during a medical emergency', color:'#1D9E75',
    sub:'Shared root: no pre-assembled emergency view or action protocol · Adult Child: Emergency Blindness + Sole Custodian Risk' },
  { id:'G3', label:'Group 3 — Doctor visit intelligence lost', color:'#185FA5',
    sub:'Shared root: no capture mechanism at point of consultation · Adult Child: Redundant Test Drain · Parent: Doctor Said Grasping Gap' },
  { id:'G4', label:'Group 4 — Medication confusion (parent only)', color:'#BA7517',
    sub:'Standalone parent pain: no structured medication log tied to conditions · Parent: Habit-Only Medication Tracking' },
];

const EPICS = [
  { id:'HRV',  label:'Health record vault',             color:'#534AB7', grp:'G1' },
  { id:'EP',   label:'Emergency passport',              color:'#1D9E75', grp:'G2' },
  { id:'ASDE', label:'AI Summaries & Data Extraction',  color:'#185FA5', grp:'G3' },
  { id:'MT',   label:'Medication tracker',              color:'#BA7517', grp:'G4' },
  { id:'TA',   label:'Trust & access control',          color:'#A32D2D', grp:'G1' },
];

const STORIES = [
  // ── GROUP 1 · EPIC: Health Record Vault ──
  {
    key:'AYUC-1', epic:'HRV', grp:'G1',
    feature:'Multi-channel document ingestion',
    persona:'Adult Child',
    title:'Upload documents via camera, gallery or file',
    desc:'As an adult child, I want to upload lab reports, prescriptions, and scans from my phone so every document lives in one place — not scattered across physical files or WhatsApp.',
    pri:'P0', sp:5, sprint:'S1', status:'todo',
    ac:[
      'Given I tap Upload on a parent profile and choose Camera, When I capture the image, Then it is saved and auto-tagged (Lab / Rx / Scan / Other) within 3 s on 4G.',
      'Given I upload a PDF from Files, When upload completes, Then the document appears chronologically with date and auto-detected type.',
      'Given upload fails due to network loss, When I reopen the app, Then the queued upload resumes automatically with no data loss.',
    ]
  },
  {
    key:'AYUC-2', epic:'HRV', grp:'G1',
    feature:'Multi-channel document ingestion',
    persona:'Parent',
    title:'One-tap camera upload — parent self-serve',
    desc:'As a parent, I want to photograph a prescription using a single large button so my paper records are digitally backed up without needing my adult child\'s help.',
    pri:'P0', sp:3, sprint:'S1', status:'todo',
    ac:[
      'Given I am on my parent home screen and tap the camera button, When the camera opens, Then the capture flow requires no more than 2 taps — no forms, no typing.',
      'Given I capture a handwritten prescription, When OCR processes it, Then the document is tagged as Prescription and added to my vault.',
      'Given upload completes, When I return to home, Then a "Shared with adult child" confirmation appears — reinforcing success.',
    ]
  },
  {
    key:'AYUC-3', epic:'HRV', grp:'G1',
    feature:'Multi-channel document ingestion',
    persona:'Adult Child',
    title:'WhatsApp prescription auto-import',
    desc:'As an adult child, I want prescriptions forwarded on WhatsApp to auto-import into the vault so I stop copy-pasting images manually.',
    pri:'P0', sp:3, sprint:'S1', status:'todo',
    ac:[
      'Given WhatsApp import is enabled, When a prescription image lands in the monitored chat, Then it appears in the vault within 60 s tagged as Prescription.',
      'Given a duplicate image is forwarded, When the system detects a matching hash, Then it shows "Already saved" — no duplicate created.',
    ]
  },
  {
    key:'AYUC-4', epic:'HRV', grp:'G1',
    feature:'Vault search, filter & timeline',
    persona:'Adult Child',
    title:'Full-text search across all records',
    desc:'As an adult child, I want to search across all of a parent\'s records by keyword so I find a prior test result in seconds and avoid paying for a repeat scan.',
    pri:'P0', sp:5, sprint:'S1', status:'todo',
    ac:[
      'Given I type in the search bar, When I enter a keyword, Then results appear in < 2 s ranked by recency.',
      'Given I apply the Lab filter, When filter is active, Then only lab reports are shown with an updated count.',
      'Given a potentially duplicate test is uploaded, When I open the record, Then the system shows "Previous test found — X months ago" with a compare link.',
    ]
  },
  {
    key:'AYUC-5', epic:'HRV', grp:'G1',
    feature:'Vault search, filter & timeline',
    persona:'Adult Child',
    title:'5-year chronological health timeline',
    desc:'As an adult child, I want a 5-year chronological health timeline for each parent so I can show any new specialist the full history in one scroll — not re-explain it verbally.',
    pri:'P1', sp:5, sprint:'S2', status:'todo',
    ac:[
      'Given I open the History tab, When it loads, Then all events (visits, labs, prescriptions, notes) appear in a chronological feed filterable by year and type.',
      'Given I open a timeline event, When I tap it, Then I see the full detail card with documents, AI summary, and doctor notes attached.',
    ]
  },
  {
    key:'AYUC-6', epic:'HRV', grp:'G1',
    feature:'Offline vault caching',
    persona:'Adult Child',
    title:'Offline record access with sync indicator',
    desc:'As an adult child, I want the record vault accessible offline so it works when the parent has no data signal — especially in rural hospitals.',
    pri:'P1', sp:3, sprint:'S2', status:'todo',
    ac:[
      'Given the phone has no network, When I open the vault, Then all cached records load with a "Last synced: X min ago" indicator.',
      'Given connectivity returns, When the app is open or backgrounded, Then a sync runs automatically and the indicator updates.',
    ]
  },

  // ── GROUP 2 · EPIC: Emergency Passport ──
  {
    key:'AYUC-7', epic:'EP', grp:'G2',
    feature:'EP trigger — persistent banner & biometric unlock',
    persona:'Adult Child',
    title:'Persistent Emergency Passport banner with biometric unlock',
    desc:'As an adult child, I want a persistent Emergency Passport banner on my home screen so I can activate the full crisis view instantly at 2 AM — no menus, no PIN, no navigation.',
    pri:'P0', sp:5, sprint:'S1', status:'todo',
    ac:[
      'Given I open the app, When the home screen loads, Then the red EP banner is always visible above the fold — no scroll required.',
      'Given I tap the EP banner, When the modal opens, Then biometric auth (FaceID / fingerprint) is the only gate and the command centre appears in < 1.5 s.',
      'Given biometric fails 3 times, When the 3rd failure occurs, Then a PIN fallback is offered — not shown by default to avoid cognitive load at 2 AM.',
      'Given I have no network, When I open EP, Then all three pillars load from cached data with a "Last synced" indicator.',
    ]
  },
  {
    key:'AYUC-8', epic:'EP', grp:'G2',
    feature:'EP — medical handover pillar',
    persona:'Adult Child',
    title:'Medical handover — blood group, allergies, TPA at a glance',
    desc:'As an adult child, I want the EP medical handover to show blood group and allergies first so the ER doctor gets critical information without me explaining anything.',
    pri:'P0', sp:5, sprint:'S1', status:'todo',
    ac:[
      'Given EP medical handover opens, When loaded, Then blood group, allergies, and current medications appear in the first visible block — no scroll needed.',
      'Given no blood group is saved, When the screen loads, Then a red "Add blood group" prompt appears with a one-tap edit.',
      'Given I tap "Share handover", When the share sheet opens, Then a secure time-limited link is generated — sendable via WhatsApp in two taps, no app install required for the doctor.',
    ]
  },
  {
    key:'AYUC-9', epic:'EP', grp:'G2',
    feature:'EP — medical handover pillar',
    persona:'Adult Child',
    title:'One-tap document share from EP — prescription, lab, TPA card',
    desc:'As an adult child, I want the latest prescription, last lab result, and insurance TPA card accessible from EP so hospital document demands are met instantly.',
    pri:'P0', sp:3, sprint:'S1', status:'todo',
    ac:[
      'Given documents are uploaded in the vault, When I open EP Medical Handover, Then the 3 most recent records of each type appear as quick-access tiles.',
      'Given I tap a document tile, When it opens, Then the full document is shown with a Share button — one tap to WhatsApp to the doctor.',
    ]
  },
  {
    key:'AYUC-10', epic:'EP', grp:'G2',
    feature:'EP — logistics pillar',
    persona:'Adult Child',
    title:'Pre-loaded home address, hospital route & ambulance call',
    desc:'As an adult child, I want the parent\'s home address and nearest hospital route pre-loaded in EP so I never fumble with Maps during a 2 AM crisis.',
    pri:'P0', sp:3, sprint:'S1', status:'todo',
    ac:[
      'Given EP Logistics is open and I tap "Hospital route", When Maps opens, Then it pre-navigates to the nearest relevant hospital using the parent\'s saved home address.',
      'Given I tap "Call ambulance", When the call screen appears, Then the local emergency number is pre-dialled — one confirm tap to call.',
    ]
  },
  {
    key:'AYUC-11', epic:'EP', grp:'G2',
    feature:'EP — ground support pillar',
    persona:'Adult Child',
    title:'One-tap simultaneous alert to contact circle',
    desc:'As an adult child, I want one tap to alert all saved contacts simultaneously so neighbours and relatives are mobilised without me making individual calls from a distance.',
    pri:'P0', sp:3, sprint:'S1', status:'todo',
    ac:[
      'Given EP Ground Support is open and I tap "Alert contacts", When the action fires, Then all pre-saved contacts receive a WhatsApp/SMS with the parent\'s address and an "I\'m on my way" reply link.',
      'Given a contact replies, When the reply lands, Then EP shows a green check next to that contact\'s name.',
    ]
  },
  {
    key:'AYUC-12', epic:'EP', grp:'G2',
    feature:'EP — ground support pillar',
    persona:'Adult Child',
    title:'Contact circle setup — roles, verification, pre-crisis nudge',
    desc:'As an adult child, I want to configure the contact circle in advance so EP alerts work without any typing during the actual crisis.',
    pri:'P1', sp:3, sprint:'S2', status:'todo',
    ac:[
      'Given I am in Settings > Contact circle and I add a contact, When I save, Then I assign a role (Son / Neighbour / Doctor / Security) and verify their number.',
      'Given I have fewer than 4 contacts saved, When I first open EP, Then a setup nudge prompts me to complete the circle before a crisis strikes.',
    ]
  },

  // ── GROUP 3 · EPIC: AI Summaries & Data Extraction (doctor visit features) ──
  {
    key:'AYUC-13', epic:'ASDE', grp:'G3',
    feature:'Voice note — doctor instruction capture',
    persona:'Adult Child',
    title:'Record doctor verbal instructions during visit',
    desc:'As an adult child, I want to record the doctor\'s verbal instructions during the parent\'s visit so nothing is forgotten by the time the parent gets home.',
    pri:'P1', sp:5, sprint:'S2', status:'todo',
    ac:[
      'Given I tap "Record voice note" during the consultation, When I stop recording, Then the audio is transcribed in < 30 s and saved as a structured note on the parent\'s profile.',
      'Given transcription is complete, When I view the note, Then I see audio playback, full transcript, and an AI-cleaned plain-English summary with key instructions highlighted.',
    ]
  },
  {
    key:'AYUC-14', epic:'ASDE', grp:'G3',
    feature:'Voice note — doctor instruction capture',
    persona:'Parent',
    title:'Replay doctor note at home in plain language',
    desc:'As a parent, I want to replay today\'s doctor note at home so I remember exactly what was advised without relying on my memory.',
    pri:'P1', sp:3, sprint:'S2', status:'todo',
    ac:[
      'Given a voice note exists for my last visit, When I open it, Then I see a play button, full transcription, and a plain-English summary.',
      'Given the summary contains a medical term, When I tap it, Then a plain-language explanation appears in my preferred language.',
    ]
  },
  {
    key:'AYUC-15', epic:'ASDE', grp:'G3',
    feature:'Prescription OCR & AI document summary',
    persona:'Adult Child',
    title:'Photograph prescription — OCR auto-parse to medication list',
    desc:'As an adult child, I want to photograph a prescription so it is automatically parsed and added to the parent\'s medication list — eliminating manual re-entry.',
    pri:'P1', sp:5, sprint:'S2', status:'todo',
    ac:[
      'Given I photograph a prescription, When OCR runs, Then drug name, dosage, and frequency are extracted and pre-filled for review.',
      'Given the parent confirms the extracted data, When saved, Then the medication is added to the active medication list with the prescription image retained.',
      'Given an unrecognised drug name appears, When OCR flags it, Then I am prompted for manual confirmation before saving.',
    ]
  },
  {
    key:'AYUC-16', epic:'ASDE', grp:'G3',
    feature:'Prescription OCR & AI document summary',
    persona:'Adult Child',
    title:'One-tap AI plain-English summary of any report',
    desc:'As an adult child, I want a one-tap AI summary of any uploaded report in plain English so I can make informed decisions at the hospital without Googling medical terms.',
    pri:'P1', sp:5, sprint:'S2', status:'todo',
    ac:[
      'Given I open any document in the vault, When I tap "AI Summary", Then a summary is generated in < 8 s with abnormal values flagged in amber.',
      'Given the report is a discharge letter, When the summary shows, Then it highlights: diagnosis · medications · follow-up date · dietary restrictions.',
      'Given a medical term appears in the summary, When I tap it, Then a plain-language tooltip is shown.',

const grpMap  = Object.fromEntries(GROUPS.map(g=>[g.id,g]));
const epicMap = Object.fromEntries(EPICS.map(e=>[e.id,e]));

function priClass(p){ return p==='P0'?'p0':p==='P1'?'p1':'p2'; }
function statClass(s){ return s==='todo'?'todo':s==='prog'?'prog':'done'; }
function statLabel(s){ return s==='todo'?'To Do':s==='prog'?'In Progress':'Done'; }
function personaClass(p){ return p==='Adult Child'?'pp-child':p==='Parent'?'pp-parent':'pp-user'; }

function filtered(){
  const q  = document.getElementById('search').value.toLowerCase();
  const eg = document.getElementById('fgrp').value;
  const ep = document.getElementById('fepic').value;
  const sp = document.getElementById('fspr').value;
  const pr = document.getElementById('fpri').value;
  return STORIES.filter(s=>
    (!q  || s.title.toLowerCase().includes(q) || s.key.toLowerCase().includes(q) || s.feature.toLowerCase().includes(q)) &&
    (!eg || s.grp===eg) && (!ep||s.epic===ep) && (!sp||s.sprint===sp) && (!pr||s.pri===pr)
  );
}

function renderBacklog(){
  const data = filtered();
  const el   = document.getElementById('grp-list');
  el.innerHTML = '';

  GROUPS.forEach(grp=>{
    const grpItems = data.filter(s=>s.grp===grp.id);
    if(!grpItems.length) return;

    const grpBlock = document.createElement('div');
    grpBlock.className = 'grp-block';

    // Group header
    const gh = document.createElement('div');
    gh.className = 'grp-hdr';
    gh.style.borderBottom = '2px solid '+grp.color;
    const totalSP = grpItems.reduce((a,s)=>a+s.sp,0);
    gh.innerHTML = `<span class="grp-dot" style="background:${grp.color}"></span>
      <span class="grp-label">${grp.label}</span>
      <span class="grp-sub">&nbsp;·&nbsp;${grp.sub}</span>
      <span class="grp-sp">${grpItems.length} issues &nbsp;·&nbsp; ${totalSP} pts</span>
      <span class="grp-chev open">▶</span>`;

    const epicSection = document.createElement('div');
    epicSection.style.display='block';

    // Group each epic within this group
    const epicsInGroup = EPICS.filter(e=>e.grp===grp.id);
    // Also catch stories whose epic.grp may differ from story.grp (cross-cutting)
    const epicIdsInData = [...new Set(grpItems.map(s=>s.epic))];

    epicIdsInData.forEach(epicId=>{
      const ep = epicMap[epicId];
      const epItems = grpItems.filter(s=>s.epic===epicId);
      if(!epItems.length) return;

      const epBlock = document.createElement('div');
      epBlock.className = 'epic-block';

      const epSP = epItems.reduce((a,s)=>a+s.sp,0);
      const eh = document.createElement('div');
      eh.className = 'epic-hdr';
      eh.innerHTML = `<span class="edot" style="background:${ep.color}"></span>
        <span class="elabel">${ep.label}</span>
        <span class="ecount">&nbsp;${epItems.length} issues</span>
        <span class="esp">${epSP} pts</span>
        <span class="echev open">▶</span>`;

      const tbl = document.createElement('table');
      tbl.className = 'etable';
      tbl.innerHTML = '<tr><th style="width:76px">Key</th><th>Summary</th><th style="width:64px">Persona</th><th style="width:44px">Pri</th><th style="width:32px">SP</th><th style="width:52px">Sprint</th><th style="width:72px">Status</th></tr>';

      epItems.forEach(s=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="ikey">${s.key}</span></td>
          <td>
            <div class="ititle">${s.title}</div>
            <div class="isub">${s.feature}</div>
          </td>
          <td><span class="pbadge ${personaClass(s.persona)}">${s.persona}</span></td>
          <td><span class="pbadge ${priClass(s.pri)}">${s.pri}</span></td>
          <td><span class="sp-chip">${s.sp}</span></td>
          <td><span class="sbadge">${s.sprint}</span></td>
          <td><span class="stbadge ${statClass(s.status)}">${statLabel(s.status)}</span></td>`;
        tr.style.cursor='pointer';
        tr.onclick=()=>openM(s);
        tbl.appendChild(tr);
      });

      let epOpen = true;
      eh.onclick = ()=>{
        epOpen = !epOpen;
        tbl.style.display = epOpen?'':'none';
        eh.querySelector('.echev').classList.toggle('open', epOpen);
      };
      epBlock.appendChild(eh);
      epBlock.appendChild(tbl);
      epicSection.appendChild(epBlock);
    });

    let grpOpen = true;
    gh.onclick = ()=>{
      grpOpen = !grpOpen;
      epicSection.style.display = grpOpen?'block':'none';
      gh.querySelector('.grp-chev').classList.toggle('open', grpOpen);
    };

    grpBlock.appendChild(gh);
    grpBlock.appendChild(epicSection);
    el.appendChild(grpBlock);
  });
}

function renderBoard(){
  const data = filtered();
  ['todo','prog','done'].forEach(s=>{
    const col   = document.getElementById('bc-'+s);
    const items = data.filter(x=>x.status===s);
    document.getElementById('bc-'+s+'-n').textContent = items.length;
    col.innerHTML = '';
    items.forEach(x=>{
      const ep   = epicMap[x.epic];
      const grp  = grpMap[x.grp];
      const card = document.createElement('div');
      card.className = 'bcard';
      card.innerHTML = `
        <div class="bkey">${x.key}</div>
        <div class="btitle">${x.title}</div>
        <div class="bfoot">
          <span class="bepicdot" style="background:${grp.color}" title="${grp.label.split('—')[0].trim()}"></span>
          <span class="pbadge ${personaClass(x.persona)}">${x.persona}</span>
          <span class="pbadge ${priClass(x.pri)}">${x.pri}</span>
          <span class="sp-chip">${x.sp}</span>
        </div>`;
      card.onclick=()=>openM(x);
      col.appendChild(card);
    });
  });
}

function renderStats(){
  const data = filtered();
  document.getElementById('sn-total').textContent = data.length;
  document.getElementById('sn-sp').textContent    = data.reduce((a,s)=>a+s.sp,0);
  document.getElementById('sn-p0').textContent    = data.filter(s=>s.pri==='P0').length;
  ['S1','S2','S3'].forEach((sp,i)=>{
    document.getElementById('sn-s'+(i+1)).textContent = data.filter(s=>s.sprint===sp).reduce((a,s)=>a+s.sp,0);
  });
}

function applyF(){ renderBacklog(); renderBoard(); renderStats(); }

function setView(v,btn){
  document.querySelectorAll('.vb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('backlog-view').style.display = v==='backlog'?'':'none';
  document.getElementById('board-view').style.display   = v==='board'?'block':'none';
}

function openM(s){
  const ep  = epicMap[s.epic];
  const grp = grpMap[s.grp];
  document.getElementById('modal-body').innerHTML = `
    <div class="mhdr">
      <span class="mkey">${s.key}</span>
      <button class="mclose" onclick="closeM()">✕</button>
    </div>
    <div class="mtitle">${s.title}</div>
    <div class="mgrp">
      <span class="grp-dot" style="background:${grp.color};display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px;vertical-align:middle"></span>
      ${grp.label}
    </div>
    <div class="mrow"><strong>Feature</strong>${s.feature}</div>
    <div class="mrow"><strong>Epic</strong><span class="edot" style="background:${ep.color};width:8px;height:8px;border-radius:2px;display:inline-block"></span>&nbsp;${ep.label}</div>
    <div class="mrow"><strong>Persona</strong><span class="pbadge ${personaClass(s.persona)}">${s.persona}</span></div>
    <div class="mrow"><strong>Priority</strong><span class="pbadge ${priClass(s.pri)}">${s.pri}</span></div>
    <div class="mrow"><strong>Story pts</strong>${s.sp} pts</div>
    <div class="mrow"><strong>Sprint</strong><span class="sbadge">${s.sprint}</span></div>
    <div class="mrow"><strong>Status</strong><span class="stbadge ${statClass(s.status)}">${statLabel(s.status)}</span></div>
    <div class="mdesc">${s.desc}</div>
    <div class="ac-section">
      <div class="aclabel">Acceptance criteria</div>
      ${s.ac.map(a=>`<div class="acitem">${a}</div>`).join('')}
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function closeM(){ document.getElementById('overlay').classList.remove('open'); }

renderBacklog(); renderBoard(); renderStats();
</script>
